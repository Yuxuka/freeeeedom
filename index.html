<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Huninn&display=swap">
<link rel="stylesheet" 
href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<link rel="stylesheet" href="./pixel-borders.css">


<title>烙跑倒數💃🏻</title>

<style>
:root{
    --active-bg: #ffffff;
    --active-border: #d5d5d5;
    --past-bg: #f2f2f2;
    --past-text: #b7b7b7;

    --week-gap: 60px;

    --days-offset: -3px;

    --track-offset:-20px;

    --track-height: 18px;    
    
    --walker-top: calc((4px + var(--walker-size)) * -1);

    --hammock-width: 36px;
    --hammock-height: 72px;
    --hammock-top: -60px;
    --marker-top: -50px;
    --marker-gap: 28px;
    --stair-width: 60px;
    --stair-height: 70px;
}

body{
    margin: 30px;
    background: #fffdf9;
    font-family: "Huninn",sans-serif;
}

#countdownBox{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 5vw, 30px);
    width: fit-content;
    max-width: 80vw;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 70px;
    padding: 18px;
    background: #fff0f3;
    text-align: center;
    font-weight: bold;
    color: #8f5d5d;
}

.countdown-main{
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3em;
}

.countdown-sub{
    margin-top: 6px;
    font-size: 0.45em;
    font-weight: normal;
    color: #a98282;
}

.normal-text{
    font-family: "Huninn", sans-serif;
}

.sparkles{
    height: 1.3em;
    vertical-align: middle;
}

.pleading{
    height: 1.5em;
    vertical-align: middle;
}

#dayNumber{
    font-family: "Press Start 2P", monospace;
    font-size: clamp(16px,5vw,28px);
}

.week{
    position: relative;
    margin-bottom: var(--week-gap);
    display: flex;
    justify-content: center;
}

.days{
    z-index: 20;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    top: var(--days-offset);
}

.days.reverse{
    flex-direction: row-reverse;
}

.day{
    z-index: 1;
    width: clamp(36px,10vw,50px);
    aspect-ratio: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(14px,5vw,20px);
    font-weight: bold;
    border-radius: 12px;
    color: #694b4b;
    border: 3px solid rgba(255,255,255,.8);
    box-shadow:  
        0 4px 0 rgba(0,0,0,.08), 
        inset 0 2px 0 rgba(255,255,255,.9);
    transition: .3s;
}

.day.past{
    transform: translateY(2px);
    box-shadow: none;
}

.day.past::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.6);
    border-radius:12px;
    z-index:1;
    pointer-events:none;
}

.day.today{
    border: 3px solid #ffd34d;
    box-shadow:
        0 4px 0 rgba(0,0,0,.08),
        inset 0 2px 0 rgba(255,255,255,.9),
        0 0 12px rgba(255,211,77,.8),
        0 0 24px rgba(255,211,77,.4);
}

.day.freedom{
    border: 3px solid #ff74b2;
}

.month-marker{
    z-index: 5;
    position: absolute;
    white-space: nowrap;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: #7b6f6f;
    text-align: center;
    top: var(--marker-top);
    opacity: 1;
    transition: opacity .3s;
    pointer-events: none;
    font-size: clamp(11px, 3vw, 15px);
}

@keyframes bounce{
    0%{transform: translateY(1px);}
    50%{transform: translateY(5px);}
    100%{transform: translateY(1px);}
}

.month-marker .arrow{
    font-size: clamp(14px,4vw,18px);
    animation: bounce 1s infinite ease-in-out;
}

.month-marker.past-month{
    opacity: .3;
}

.track{
    z-index: 10;
    image-rendering: pixelated;
    position: absolute;
    left: 0;
    top: var(--track-offset);
    height: var(--track-height);
    border-radius: 5px;
    overflow: hidden;
    background: transparent;
}

.track-completed{
    position:absolute;
    left:0;
    top:0;
    height:100%;

    background-image:url(completed.png);
    background-repeat:repeat-x;
    background-size:auto 100%;
}

.track-current{
    position:absolute;
    top:0;
    left:0;
    width:72px;
    height:100%;
    display: none;
    background-image:url(current.png);
    background-repeat:no-repeat;
    background-size:100% 100%;
}


.walker{
    z-index: 40;
    image-rendering: pixelated;
    position: absolute;
    width: auto;
    height: auto;
    top: var(--walker-top);
    transition: .3s;
}

.walker.hidden{
    display: none;
}

.flag{
    z-index: 30;
    image-rendering: pixelated;
    position: absolute;
    top: -25px;
    right: 20px;
    width: 24px;
    height: 24px;
}

.hammock{
    z-index: 30;
    image-rendering: pixelated;
    position: absolute;
    width: var(--hammock-width);
    height: var(--hammock-height);
    top: var(--hammock-top);
    left: 50%;
    transform: translateX(-50%);
}

.stair{
    z-index: 6;
    image-rendering: pixelated;
    position: absolute;
    width: var(--stair-width);
    height: var(--stair-height);
    bottom: calc(var(--stair-height) * -1);
    background-repeat: no-repeat;
    background-size: 100% 100%;
    pointer-events: none;
}

.stair.stair-right{
    right: 20px;
}

.stair.stair-left{
    left: 20px;
}

</style>
</head>
<body>


<div id="countdownBox" class="pixel-borders pixel-borders--3a pixel-borders--inset pixel-borders--inset-all">
    <div class="countdown-main">
        <span class="normal-text">烙跑倒數</span>
        <span id="dayNumber">dayNumber</span>
        <span class="normal-text">天</span>
        <img class="sparkles" src="sparkles.png">
    </div>
    <div class="countdown-sub normal-text">
        （還有 <span id="calendarDayNumber">calendarDayNumber</span> 天！<img class="pleading" src="pleading-face.webp">）
    </div>
</div>

<div id="calendar"></div>

<script>
const START_DATE="2026-06-29";
const END_DATE="2026-09-06";
const ENABLE_WALKER=true;
const WALK_GIF_SMALL="walk_36px.gif";
const WALK_GIF_LARGE="walk_48px.gif";
const TRACK_IMAGE="";
const HAMMOCK_GIF="";
const STAIR_IMAGE="";
const WEEK_COLORS=["#ffbfd9","#ffe79a","#bff0b7","#bfeeff"];
const LAST_WORKDAY = "2026-09-04";
const SLEEP_DATE_1 = "2026-09-05";
const SLEEP_DATE_2 = "2026-09-06";
const SLEEP_GIF = "";
const REST_GIF = "";

const TRACK_CURRENT_WIDTH = 72;
const TRACK_CURRENT_HALF = TRACK_CURRENT_WIDTH / 2;
const MOBILE_BREAKPOINT = 480;

const calendar=document.getElementById("calendar");

function getTaipeiDate(date){
    const utc=date.getTime() + date.getTimezoneOffset() * 60000;
    return new Date(utc + 8 * 3600000);
}

function formatDate(d){
    const taipei=getTaipeiDate(d);
    const y=taipei.getFullYear();
    const m=String(taipei.getMonth()+1).padStart(2,"0");
    const day=String(taipei.getDate()).padStart(2,"0");

    return `${y}-${m}-${day}`;
}

function getRemainingWorkdays(startDate, endDate){
    let count = 0;
    const checkDate = new Date(startDate);
    checkDate.setHours(0,0,0,0);

    const end = new Date(endDate);
    end.setHours(0,0,0,0);

    while(checkDate <= end){
        const day = checkDate.getDay();
        if(day >= 1 && day <= 5){
            count++;
        }
        checkDate.setDate(checkDate.getDate()+1);
    }

    return count;
}


const dates=[];
let current=new Date(START_DATE);

while(current <= new Date(END_DATE)){
    dates.push(new Date(current));
    current.setDate(current.getDate()+1);
}

const weeks=[];
let currentWeek=[];

dates.forEach(date=>{
    currentWeek.push(date);
    const taipei=getTaipeiDate(date);
    if(taipei.getDay()===0){
        weeks.push(currentWeek);
        currentWeek=[];
    }
});

if(currentWeek.length){
    weeks.push(currentWeek);
}

const nowTaipei=getTaipeiDate(new Date());
const today=new Date(nowTaipei);
today.setHours(0,0,0,0);

const endDate=getTaipeiDate(new Date(END_DATE));
endDate.setHours(0,0,0,0);

const lastWorkdayDate=getTaipeiDate(new Date(LAST_WORKDAY));
lastWorkdayDate.setHours(0,0,0,0);

const remainingCalendarDays=Math.max(0, Math.ceil((endDate - today) / (1000*60*60*24)));

const remainingWorkdays = today <= lastWorkdayDate
    ? getRemainingWorkdays(today, lastWorkdayDate)
    : 0;

document.getElementById("dayNumber").textContent = remainingWorkdays;
document.getElementById("calendarDayNumber").textContent = remainingCalendarDays;

let currentWeekIndex=-1;
let currentDayIndex=-1;

function updateTrackWidth(track,row){
    track.style.width=row.offsetWidth+"px";
    track.style.left=row.offsetLeft+"px";
}

weeks.forEach((week,weekIndex)=>{
    const weekColor=WEEK_COLORS[weekIndex % WEEK_COLORS.length];

    const wrapper=document.createElement("div");
    wrapper.className="week";

    const track=document.createElement("div");
    track.className="track";

    const trackCompleted=document.createElement("div");
    trackCompleted.className="track-completed";

    const trackCurrent=document.createElement("div");
    trackCurrent.className="track-current";

    track.appendChild(trackCompleted);
    track.appendChild(trackCurrent);

    if(TRACK_IMAGE){
        track.style.background=`url(${TRACK_IMAGE}) center/cover`;
    }

    const walker=document.createElement("img");
    walker.className="walker";

    const { size: walkerSize, src: walkerSrc } = getWalkerSize();
    walker.src = walkerSrc;
    walker.width = walkerSize;
    walker.height = walkerSize;

    if(!ENABLE_WALKER){
        walker.classList.add("hidden");
    }

    wrapper.appendChild(walker);
    wrapper.appendChild(track);

    const row=document.createElement("div");
    row.className="days";
    if(weekIndex%2===1){
        row.classList.add("reverse");
    }

    week.forEach((date,index)=>{
        const taipei=getTaipeiDate(date);
        const day=document.createElement("div");
        day.className="day";
        day.style.background=weekColor;
        day.textContent=taipei.getDate();

        if(taipei.getDate()===1 || formatDate(date)===START_DATE){
            const marker=document.createElement("div");
            marker.className="month-marker";
            marker.innerHTML=`
                <div>${taipei.getMonth()+1}月</div>
                <div class="arrow">▼</div>
            `;

            const markerMonth=taipei.getMonth();
            const currentMonth=today.getMonth();
            
            if(markerMonth < currentMonth){
                marker.classList.add("past-month");
            }

            day.appendChild(marker);
        }

        if(formatDate(date) < formatDate(today)){
            day.classList.add("past");
        }

        day.dataset.weekIndex=weekIndex;
        day.dataset.dayIndex=index;
        day.dataset.date=formatDate(date);

        if(formatDate(date)===formatDate(today)){
            day.classList.add("today");
            currentWeekIndex=weekIndex;
            currentDayIndex=index;
        }

        if(formatDate(date)===LAST_WORKDAY){
            day.classList.add("freedom");
        }

        if(formatDate(date)===LAST_WORKDAY){
            const flag=document.createElement("img");
            flag.className="flag";
            flag.src="flag.png";
            day.appendChild(flag);
        }

        row.appendChild(day);
        if(index < week.length-1){
            const gap=document.createElement("div");
            if(taipei.getDay()===5){
                gap.style.width="20px";
            }
            else{
                gap.style.width="5px";
            }

            row.appendChild(gap);
        }
    });

    wrapper.appendChild(row);

    if(STAIR_IMAGE && weekIndex < weeks.length - 1){
        const stair = document.createElement("div");
        const isReverseWeek = weekIndex % 2 === 1;
        stair.className = "stair " + (isReverseWeek ? "stair-left" : "stair-right");
        stair.style.backgroundImage = `url(${STAIR_IMAGE})`;
        wrapper.appendChild(stair);
    }
    
    calendar.appendChild(wrapper);

    requestAnimationFrame(()=>{
        updateTrackWidth(track, row);
    });
});

function getCharacterMode(){
    const todayStr = formatDate(today);

    if(todayStr === SLEEP_DATE_1 || todayStr === SLEEP_DATE_2){
        return "sleeping";
    }

    const day = nowTaipei.getDay();
    const hour = nowTaipei.getHours();
    const isRestWindow =
        (day===5 && hour>=20) ||
        day===6 ||
        day===0 ||
        (day===1 && hour<8);

    if(isRestWindow){
        return "resting";
    }

    return "walking";
}

function getWalkerSize(){
    return window.innerWidth < MOBILE_BREAKPOINT
        ? { size: 36, src: WALK_GIF_SMALL }
        : { size: 48, src: WALK_GIF_LARGE };
}

function applyWalkerSize(){
    const { size, src } = getWalkerSize();
    document.documentElement.style.setProperty("--walker-size", `${size}px`);

    document.querySelectorAll(".walker").forEach(walker=>{
        walker.width = size;
        walker.height = size;
        if(walker.getAttribute("src") !== src){
            walker.src = src;
        }
    });
}

applyWalkerSize();

function setTrackCurrentSpan(trackCompleted, trackCurrent, anchorLeft, width, rowWidth, isReverse){
    const clampedLeft = Math.max(0, Math.min(rowWidth - width, anchorLeft));
    const anchorRight = clampedLeft + width;

    trackCurrent.style.width = width + "px";

    if(!isReverse){
        trackCompleted.style.left = "0px";
        trackCompleted.style.right = "auto";
        trackCompleted.style.width = clampedLeft + "px";

        trackCurrent.style.left = clampedLeft + "px";
        trackCurrent.style.right = "auto";
    }else{
        trackCompleted.style.left = "auto";
        trackCompleted.style.right = "0px";
        trackCompleted.style.width = Math.max(0, rowWidth - anchorRight) + "px";

        trackCurrent.style.left = "auto";
        trackCurrent.style.right = Math.max(0, rowWidth - anchorRight) + "px";
    }
}

function renderAllTracks(){
    const allWeeks = document.querySelectorAll(".week");

    allWeeks.forEach((weekEl, index)=>{
        const row = weekEl.querySelector(".days");
        const track = weekEl.querySelector(".track");

        track.style.display = "";
        updateTrackWidth(track, row);

        const trackCompleted=weekEl.querySelector(".track-completed");
        const trackCurrent=weekEl.querySelector(".track-current");

        if(index < currentWeekIndex){
            trackCompleted.style.left = "0";
            trackCompleted.style.right = "auto";
            trackCompleted.style.width = "100%";
            trackCurrent.style.display = "none";
        }else if(index > currentWeekIndex){
            track.style.display = "none";
        }
    });
     document.querySelectorAll(".hammock").forEach(el => el.remove());

     if(currentWeekIndex < 0) return;

     const week = allWeeks[currentWeekIndex];
     const row = week.querySelector(".days");
     const walker = week.querySelector(".walker");
     const trackCompleted = week.querySelector(".track-completed");
     const trackCurrent=week.querySelector(".track-current");

     if(!row || !walker){
        console.warn("renderAllTracks: 找不到 row / walker，略過本次渲染");
        return;
    }

        document.querySelectorAll(".walker").forEach(w=>{
            w.style.display = "none";
        });

        if(!ENABLE_WALKER) return;

        const rowRect=row.getBoundingClientRect();
        const weekRect=week.getBoundingClientRect();
        const isReverse=row.classList.contains("reverse");
        const mode=getCharacterMode();
        const { size: walkerSize, src: walkingSrc } = getWalkerSize();

        trackCurrent.style.display = "block";

        if(mode === "sleeping" && SLEEP_GIF){
            const box1 = week.querySelector(`[data-date="${SLEEP_DATE_1}"]`);
            const box2 = week.querySelector(`[data-date="${SLEEP_DATE_2}"]`);

            if(!box1 || !box2){
                console.warn("renderAllTracks: 找不到睡眠模式對應日期格子");
                return;
            }

            const rect1 = box1.getBoundingClientRect();
            const rect2 = box2.getBoundingClientRect();
            const leftMost = Math.min(rect1.left, rect2.left);
            const rightMost = Math.max(rect1.right, rect2.right);
            const spanWidth = rightMost - leftMost;

            walker.src = SLEEP_GIF || walkingSrc;
            walker.style.display = "block";
            walker.style.width = spanWidth + "px";
            walker.style.height = walkerSize + "px";
            walker.style.left = (leftMost - weekRect.left) + "px";
            walker.style.transform = "scaleX(1)";

            setTrackCurrentSpan(
                trackCompleted, trackCurrent,
                leftMost - rowRect.left, spanWidth,
                rowRect.width, isReverse
                );
            return;
        }

        const targetBox = week.querySelector(".day.today");

        if(!targetBox){
            console.warn("renderAllTracks: 找不到 targetBox，略過本次渲染");
            return;
        }

        const boxRect = targetBox.getBoundingClientRect();
        const boxCenterInRow = boxRect.left - rowRect.left + boxRect.width / 2;

        walker.src = mode === "resting" ? (REST_GIF || walkingSrc) : walkingSrc;
        walker.style.display = "block";
        walker.style.width = walkerSize + "px";
        walker.style.height = walkerSize + "px";
        walker.style.transform = isReverse ? "scaleX(-1)" : "scaleX(1)";

        const walkerLeftInWeek = boxRect.left - weekRect.left + boxRect.width/2 - walkerSize/2;
        walker.style.left = walkerLeftInWeek + "px";

        setTrackCurrentSpan(
            trackCompleted, trackCurrent,
            boxCenterInRow - TRACK_CURRENT_HALF, TRACK_CURRENT_WIDTH,
            rowRect.width, isReverse
            );

        if(mode === "resting" && HAMMOCK_GIF){
            const hammock = document.createElement("img");
            hammock.src = HAMMOCK_GIF;
            hammock.className = "hammock";
            week.appendChild(hammock);
        }
    }

requestAnimationFrame(renderAllTracks);

let resizeTimer;
function handleResize(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(()=>{
        applyWalkerSize();
        renderAllTracks();
    }, 150);
}

window.addEventListener("resize", handleResize);

</script>
 
</body>
</html>
