<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Huninn&display=swap">
<link rel="stylesheet" 
href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<link rel="stylesheet" href="./pixel-borders.css">


<title>烙跑倒數💃🏻</title>

<style>
:root{
    --box-size: 50px;
    --active-bg: #ffffff;
    --active-border: #d5d5d5;
    --past-bg: #f2f2f2;
    --past-text: #b7b7b7;

    --week-gap: 50px;

    --days-offset: -3px;

    --track-offset:-20px;
    --track-gap: 20px;
    --track-height: 18px;
    --track-anchor: calc(var(--track-offset) + var(--track-height) / 2);
    
    --walker-size: 48px;
    --walker-top: -50px;

    --hammock-height: 60px;
    --hammock-top: -60px;
    --marker-top: -50px;
    --marker-gap: 28px;
}

body{
    margin: 30px;
    background: #fffdf9;
    font-family: "Huninn",sans-serif;
}

#countdownBox{
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3em;
    font-size: clamp(18px, 5vw, 30px);
    width: fit-content;
    max-width: 80vw;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 70px;
    padding: 18px;
    background: #fff0f3;
    text-align: center;
    font-weight: bold;
    color: #8f5d5d;
}

.normal-text{
    font-family: "Huninn", sans-serif;
}

.sparkles{
    height: 1.5em;
    vertical-align: middle;
}

#dayNumber{
    font-family: "Press Start 2P", monospace;
    font-size: clamp(16px,5vw,28px);
}

.week{
    position: relative;
    margin-bottom: var(--week-gap);
    display: flex;
    justify-content: center;
}

.days{
    z-index: 20;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    top: var(--days-offset);
}

.days.reverse{
    flex-direction: row-reverse;
}

.day{
    z-index: 1;
    width: clamp(36px,10vw,50px);
    aspect-ratio: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(14px,5vw,20px);
    font-weight: bold;
    border-radius: 12px;
    color: #694b4b;
    border: 3px solid rgba(255,255,255,.8);
    box-shadow:  
        0 4px 0 rgba(0,0,0,.08), 
        inset 0 2px 0 rgba(255,255,255,.9);
    transition: .3s;
}

.day.past{
    transform: translateY(2px);
    box-shadow: none;
}

.day.past::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.6);
    border-radius:12px;
    z-index:1;
    pointer-events:none;
}

.day.today{
    border: 3px solid #ffd34d;
}

.day.freedom{
    border: 3px solid #ff74b2;
}

.month-marker{
    z-index: 20;
    position: absolute;
    white-space: nowrap;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: #7b6f6f;
    text-align: center;
    top: var(--marker-top);
    opacity: 1;
    transition: opacity .3s;
    pointer-events: none;
    font-size: clamp(11px, 3vw, 15px);
}

@keyframes bounce{
    0%{transform: translateY(1px);}
    50%{transform: translateY(5px);}
    100%{transform: translateY(1px);}
}

.month-marker .arrow{
    font-size: clamp(14px,4vw,18px);
    animation: bounce 1s infinite ease-in-out;
}

.month-marker.past-month{
    opacity: .3;
}

.track{
    z-index: 10;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: var(--track-offset);
    width: 100%;
    height: var(--track-height);
    border-radius: 5px;
    background: #ffd9e5;
    overflow: hidden;
}

.track-image{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.track-completed{
    background:#8fd694;
}

.track-current{
    background:#ffd9e5;
}

.track-future{
    background:#e9e9e9;
}

.walker{
    z-index: 40;
    image-rendering: pixelated;
    position: absolute;
    width: auto;
    height: auto;
    top: var(--walker-top);
    transition: .3s;
}

.walker.hidden{
    display: none;
}

.flag{
    z-index: 30;
    position: absolute;
    top: -25px;
    right: 20px;
    font-size: 24px;
}

.hammock{
    z-index: 30;
    position: absolute;
    width: 80px;
    height: var(--hammock-height);
    top: var(--hammock-top);
    left: 50%;
    transform: translateX(-50%);
}

</style>
</head>
<body>


<div id="countdownBox" class="pixel-borders pixel-borders--3a pixel-borders--inset pixel-borders--inset-all">
    <span class="normal-text">烙跑倒數</span>
    <span id="dayNumber">dayNumber</span>
    <span class="normal-text">天</span>
    <img class="sparkles" src="sparkles.png">
</div>

<div id="calendar"></div>

<script>
const START_DATE="2026-06-29";
const END_DATE="2026-09-06";
const ENABLE_WALKER=true;
const WALK_GIF_SMALL="walk_24px.gif";
const WALK_GIF_LARGE="walk_48px.gif";
const HAMMOCK_GIF="";
const TRACK_IMAGE="";
const WEEK_COLORS=["#ffbfd9","#ffe79a","#bff0b7","#bfeeff"];

const calendar=document.getElementById("calendar");

function getTaipeiDate(date){
    const utc=date.getTime() + date.getTimezoneOffset() * 60000;
    return new Date(utc + 8 * 3600000);
}

function formatDate(d){
    const taipei=getTaipeiDate(d);
    const y=taipei.getUTCFullYear();
    const m=String(taipei.getUTCMonth()+1).padStart(2,"0");
    const day=String(taipei.getUTCDate()).padStart(2,"0");

    return `${y}-${m}-${day}`;
}

const dates=[];
let current=new Date(START_DATE);

while(current <= new Date(END_DATE)){
    dates.push(new Date(current));
    current.setDate(current.getDate()+1);
}

const weeks=[];
let currentWeek=[];

dates.forEach(date=>{
    currentWeek.push(date);
    const taipei=getTaipeiDate(date);
    if(taipei.getUTCDay()===0){
        weeks.push(currentWeek);
        currentWeek=[];
    }
});

if(currentWeek.length){
    weeks.push(currentWeek);
}

const nowTaipei=getTaipeiDate(new Date());
const today=new Date(nowTaipei);
today.setUTCHours(0,0,0,0);
const endDate=getTaipeiDate(new Date(END_DATE));
endDate.setUTCHours(0,0,0,0);

const remainingDays=Math.max(0, Math.ceil((endDate - today) / (1000*60*60*24)));

document.getElementById("dayNumber").textContent=remainingDays;

let currentWeekIndex=-1;
let currentDayIndex=-1;

function updateTrackWidth(track, row){
    track.style.width=row.offsetWidth+"px";
}

weeks.forEach((week,weekIndex)=>{
    const weekColor=WEEK_COLORS[weekIndex % WEEK_COLORS.length];

    const wrapper=document.createElement("div");
    wrapper.className="week";

    const track=document.createElement("div");
    track.className="track track-u";
    if(TRACK_IMAGE){
        track.innerHTML=`<img class="track-image" src="${TRACK_IMAGE}">`;
    }

    const walker=document.createElement("img");
    walker.className="walker";

    const useSmallWalker=window.innerWidth < 480;
    walker.src=useSmallWalker
        ? WALK_GIF_SMALL
        : WALK_GIF_LARGE;
    walker.width=useSmallWalker ? 24 : 48;
    walker.height=useSmallWalker ? 24 : 48;
    if(!ENABLE_WALKER){
        walker.classList.add("hidden");
    }

    wrapper.appendChild(walker);
    wrapper.appendChild(track);

    const row=document.createElement("div");
    row.className="days";
    if(weekIndex%2===1){
        row.classList.add("reverse");
    }

    week.forEach((date,index)=>{
        const taipei=getTaipeiDate(date);
        const day=document.createElement("div");
        day.className="day";
        day.style.background=weekColor;
        day.textContent=taipei.getUTCDate();

        if(taipei.getUTCDate()===1 || formatDate(date)===START_DATE){
            const marker=document.createElement("div");
            marker.className="month-marker";
            marker.innerHTML=`
                <div>${taipei.getUTCMonth()+1}月</div>
                <div class="arrow">▼</div>
            `;

            const markerMonth=taipei.getUTCMonth();
            const currentMonth=today.getUTCMonth();
            
            if(markerMonth < currentMonth){
                marker.classList.add("past-month");
            }

            day.appendChild(marker);
        }

        if(formatDate(date) < formatDate(today)){
            day.classList.add("past");
        }

        day.dataset.weekIndex=weekIndex;
        day.dataset.dayIndex=index;

        if(formatDate(date)===formatDate(today)){
            day.classList.add("today");
            currentWeekIndex=weekIndex;
            currentDayIndex=index;
        }

        if(formatDate(date)===END_DATE){
            day.classList.add("freedom");
            const flag=document.createElement("div");
            flag.className="flag";
            flag.textContent="🚩";
            day.appendChild(flag);
        }

        row.appendChild(day);
        if(index < week.length-1){
            const gap=document.createElement("div");
            if(taipei.getUTCDay()===5){
                gap.style.width="20px";
            }
            else{
                gap.style.width="5px";
            }

            row.appendChild(gap);
        }
    });

    wrapper.appendChild(row);
    calendar.appendChild(wrapper);

    requestAnimationFrame(()=>{
        updateTrackWidth(track, row);
    });
});

requestAnimationFrame(()=>{
    if(currentWeekIndex<0) return;

    const allWeeks=document.querySelectorAll(".week");
    allWeeks.forEach((weekEl,index)=>{
        const track=weekEl.querySelector(".track");
        if(index < currentWeekIndex){
            track.classList.add("track-completed");
        }
        else if(index === currentWeekIndex){
            track.classList.add("track-current");
        }
        else{
            track.classList.add("track-future");
        }
    });

    const week=allWeeks[currentWeekIndex];
    const boxes=week.querySelectorAll(".day");
    const targetBox=boxes[currentDayIndex];
    const track=week.querySelector(".track");

    const allWalkers=document.querySelectorAll(".walker");
    allWalkers.forEach(w=>{
        w.style.display="none";
    })
    const walker=week.querySelector(".walker");
    walker.style.display="block";

    if(ENABLE_WALKER && walker){
        const walkerWidth=walker.offsetWidth;
        const weekRect=week.getBoundingClientRect();
        const boxRect=targetBox.getBoundingClientRect();
        const progressWidth=boxRect.left - weekRect.left + boxRect.width / 2;
        track.style.width=progressWidth + "px";
        const x=boxRect.left - weekRect.left + boxRect.width/2 - walkerWidth/2;
        walker.style.left=x + "px";
        walker.style.transform=currentWeekIndex % 2===0
            ? "scaleX(1)"
            : "scaleX(-1)";
    }
});

function showHammock(){
    if(!HAMMOCK_GIF) return;

    const day=nowTaipei.getUTCDay();
    const hour=nowTaipei.getUTCHours();
    const sleepMode=(day===0 && hour>=20) || (day===1 && hour<8);

    if(!sleepMode) return;

    const week=document.querySelectorAll(".week")[currentWeekIndex];
    if(!week) return;

    const hammock=document.createElement("img");
    hammock.src=HAMMOCK_GIF;
    hammock.className="hammock";
    week.appendChild(hammock);

    const walker=week.querySelector(".walker");
    if(walker){
        walker.style.display="none";
    }
}

showHammock();
</script>
 
</body>
</html>
