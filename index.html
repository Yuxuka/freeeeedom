<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Huninn&display=swap">
<link rel="stylesheet" 
href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<link rel="stylesheet" href="./pixel-borders.css">


<title>烙跑倒數💃🏻</title>

<style>
:root{
    --box-size: 50px;
    --active-bg: #ffffff;
    --active-border: #d5d5d5;
    --past-bg: #f2f2f2;
    --past-text: #b7b7b7;
    --track-offset:-28px;
    --track-gap: 20px;
    --week-gap: 50px;
    --track-height: 18px;
    --walker-size: 50px;
    --hammock-height: 60px;
    --marker-gap: 28px;
    --track-anchor: calc(var(--track-offset) + var(--track-height) / 2);
    --days-offset: calc(var(--track-offset) + 25px);
}

body{
    margin: 30px;
    background: #fffdf9;
    font-family: "Huninn",sans-serif;
}

#countdownBox{
    display: block;
    width: fit-content;
    max-width: 80vw;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 70px;
    padding: 18px;
    background: #fff0f3;
    text-align: center;
    font-size: 30px;
    font-weight: bold;
    color: #8f5d5d;
}

.normal-text{
    font-family: "Huninn", sans-serif;
}

#dayNumber{
    font-family: "Press Start 2P", monospace;
}

.week{
    position: relative;
    margin-bottom: var(--week-gap);
    display: flex;
    justify-content: center;
}

.days{
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    top: var(--days-offset);
}

.days.reverse{
    flex-direction: row-reverse;
}

.day{
    width: min(50px,10vw);
    aspect-ratio: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: min(20px,5vw);
    font-weight: bold;
    border-radius: 12px;
    color: #694b4b;
    border: 3px solid rgba(255,255,255,.8);
    box-shadow:  
        0 4px 0 rgba(0,0,0,.08), 
        inset 0 2px 0 rgba(255,255,255,.9);
    transition: .3s;
}

.day.past{
    opacity: .35;
    transform: translateY(2px);
    box-shadow: none;
}

.day.today{
    border: 3px solid #ffd34d;
}

.day.freedom{
    border: 3px solid #ff74b2;
}

.month-marker{
    position: absolute;
    white-space: nowrap;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: #7b6f6f;
    text-align: center;
    top: calc(var(--track-anchor) - var(--marker-gap) - var(--days-offset));
}

@keyframes bounce{
    0%{transform: translateY(1px);}
    50%{transform: translateY(5px);}
    100%{transform: translateY(1px);}
}

.month-marker .arrow{
    font-size: 18px;
    animation: bounce 1s infinite ease-in-out;
}

.month-marker.past-month{
    opacity: .3;
}

.track{
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: var(--track-offset);
    height: var(--track-height);
    border-radius: 5px;
    background: #ffd9e5;
    overflow: hidden;
}

.track-image{
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.walker{
    position: absolute;
    width: var(--walker-size);
    height: var(--walker-size);
    top: calc(var(--track-anchor) - (var(--walker-size) / 2));
    transition: .3s;
}

.walker.hidden{
    display: none;
}

.flag{
    position: absolute;
    top: -25px;
    right: 15px;
    font-size: 24px;
}

.hammock{
    position: absolute;
    width: 80px;
    height: var(--hammock-height);
    top: calc(var(--track-anchor) - 52px);
    left: 50%;
    transform: translateX(-50%);
}

</style>
</head>
<body>

<div id="countdownBox" class="pixel-borders pixel-borders--3a pixel-borders--inset pixel-borders--inset-all">
    <span class="normal-text">烙跑倒數</span>
    <span id="dayNumber">dayNumber</span>
    <span class="normal-text">天 ✨</span>
</div>

<div id="calendar"></div>

<script>
const START_DATE="2026-06-29";
const END_DATE="2026-09-06";
const WALK_GIF="";
const HAMMOCK_GIF="";
const TRACK_IMAGE="";
const WEEK_COLORS=["#ffbfd9","#ffe79a","#bff0b7","#bfeeff"];

const calendar=document.getElementById("calendar");
function formatDate(d){
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,"0");
    const day=String(d.getDate()).padStart(2,"0");

    return `${y}-${m}-${day}`;
}

const dates=[];
let current=new Date(START_DATE);

while(current <= new Date(END_DATE)){
    dates.push(new Date(current));
    current.setDate(current.getDate()+1);
}

const weeks=[];
let currentWeek=[];

dates.forEach(date=>{
    currentWeek.push(date);
    if(date.getDay()===0){
        weeks.push(currentWeek);
        currentWeek=[];
    }
});

if(currentWeek.length){
    weeks.push(currentWeek);
}

const today=new Date();
const endDate=new Date(END_DATE);
const remainingDays=Math.max(0, Math.ceil((endDate - today) / (1000*60*60*24)));

document.getElementById("dayNumber").textContent=remainingDays;
today.setHours(0,0,0,0);

let currentWeekIndex=-1;
let currentDayIndex=-1;

weeks.forEach((week,weekIndex)=>{
    const weekColor=WEEK_COLORS[weekIndex % WEEK_COLORS.length];

    const wrapper=document.createElement("div");
    wrapper.className="week";

    const track=document.createElement("div");
    track.className="track";
    if(TRACK_IMAGE){
        track.innerHTML=`<img class="track-image" src="${TRACK_IMAGE}">`;
    }

    const walker=document.createElement("img");
    walker.className="walker";
    if(!WALK_GIF){
        walker.classList.add("hidden");
    }else{
        walker.src=WALK_GIF;
    }

    wrapper.appendChild(walker);
    wrapper.appendChild(track);

    const row=document.createElement("div");
    row.className="days";
    if(weekIndex%2===1){
        row.classList.add("reverse");
    }

    week.forEach((date,index)=>{
        const day=document.createElement("div");
        day.className="day";
        day.style.background=weekColor;
        day.textContent=date.getDate();

        if(date.getDate()===1 || formatDate(date)===START_DATE){
            const marker=document.createElement("div");
            marker.className="month-marker";
            marker.innerHTML=`
                <div>${date.getMonth()+1}月</div>
                <div class="arrow">▼</div>
            `;
            day.appendChild(marker);
        }

        if(date < today){
            day.classList.add("past");
        }

        if(formatDate(date)===formatDate(today)){
            day.classList.add("today");
            currentWeekIndex=weekIndex;
            currentDayIndex=index;
        }

        if(formatDate(date)===END_DATE){
            day.classList.add("freedom");
            const flag=document.createElement("div");
            flag.className="flag";
            flag.textContent="🚩";
            day.appendChild(flag);
        }

        row.appendChild(day);
        if(index < week.length-1){
            const gap=document.createElement("div");
            if(date.getDay()===5){
                gap.style.width="20px";
            }
            else{
                gap.style.width="5px";
            }

            row.appendChild(gap);
        }
    });

    wrapper.appendChild(row);
    calendar.appendChild(wrapper);

    requestAnimationFrame(()=>{
        track.style.width=row.offsetWidth+"px";
    });
});

requestAnimationFrame(()=>{
    if(currentWeekIndex<0) return;

    const week=document.querySelectorAll(".week")[currentWeekIndex];
    const boxes=week.querySelectorAll(".day");
    const targetBox=currentWeekIndex%2===0
        ? boxes[currentDayIndex]
        : boxes[boxes.length-1-currentDayIndex];
    
    const track=week.querySelector(".track");
    const walker=week.querySelector(".walker");

    track.style.display="block";

    if(WALK_GIF && walker){
        walker.style.display="block";
        const x=targetBox.offsetLeft + targetBox.offsetWidth/2 - 28;
        walker.style.left=x+"px";
        walker.style.transform=currentWeekIndex % 2===0
            ? "scaleX(1)"
            : "scaleX(-1)";
    }
});

function showHammock(){
    if(!HAMMOCK_GIF) return;

    const now=new Date();
    const day=now.getDay();
    const hour=now.getHours();
    const sleepMode=(day===0 && hour>=20) || (day===1 && hour<8);

    if(!sleepMode) return;

    const week=document.querySelectorAll(".week")[currentWeekIndex];
    if(!week) return;

    const hammock=document.createElement("img");
    hammock.src=HAMMOCK_GIF;
    hammock.className="hammock";
    week.appendChild(hammock);

    const walker=week.querySelector(".walker");
    if(walker){
        walker.style.display="none";
    }
}

showHammock();
</script>
 
</body>
</html>
